<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Inventory System</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --border-focus: #e8e8e8;
      --text: #f0f0f0;
      --muted: #6b6b6b;
      --accent: #d4f54a;
      --accent-dark: #a8c92e;
      --error: #ff5c5c;
      --success: #4af5a0;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 1rem;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tag {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tag::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    h1 {
      font-family: var(--font-display);
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
    }

    .field {
      margin-bottom: 1.25rem;
      animation: fadeUp 0.5s ease both;
    }

    .field:nth-child(1) { animation-delay: 0.08s; }
    .field:nth-child(2) { animation-delay: 0.14s; }
    .field:nth-child(3) { animation-delay: 0.20s; }
    .field:nth-child(4) { animation-delay: 0.26s; }
    .field:nth-child(5) { animation-delay: 0.32s; }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    input:focus, select:focus {
      border-color: var(--border-focus);
    }

    input::placeholder {
      color: var(--muted);
    }

    select option {
      background: var(--surface);
      color: var(--text);
    }

    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 12px;
    }

    .btn {
      width: 100%;
      margin-top: 0.5rem;
      padding: 13px;
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      border-radius: 8px;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .btn:hover  { background: var(--accent-dark); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .alert {
      display: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .alert.error {
      background: rgba(255, 92, 92, 0.1);
      border: 1px solid rgba(255, 92, 92, 0.3);
      color: var(--error);
    }

    .alert.success {
      background: rgba(74, 245, 160, 0.1);
      border: 1px solid rgba(74, 245, 160, 0.3);
      color: var(--success);
    }

    .alert.visible { display: block; }

    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 13px;
      color: var(--muted);
    }

    .footer-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-link a:hover { text-decoration: underline; }

    .loading-dots span {
      display: inline-block;
      animation: blink 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="tag">Inventory System</div>
    <h1>Create account.</h1>
    <p class="subtitle">Register a new user to access the inventory system.</p>

    <div class="card">
      <div class="alert error" id="errorMsg"></div>
      <div class="alert success" id="successMsg"></div>

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="your_username" autocomplete="username"/>
      </div>

      <div class="field">
        <label for="email">Email <span style="color: var(--muted); font-size:10px;">(optional)</span></label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password"/>
      </div>

      <div class="field">
        <label for="role">Role</label>
        <div class="select-wrapper">
          <select id="role">
            <option value="staff">Staff</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>

      <div class="field">
        <button class="btn" id="registerBtn" onclick="handleRegister()">Create Account</button>
      </div>
    </div>

    <div class="footer-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script>
    const BASE_URL = 'http://localhost:8000';

    const registerBtn = document.getElementById('registerBtn');
    const errorMsg    = document.getElementById('errorMsg');
    const successMsg  = document.getElementById('successMsg');

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleRegister();
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
      successMsg.classList.remove('visible');
    }

    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.classList.add('visible');
      errorMsg.classList.remove('visible');
    }

    function hideAlerts() {
      errorMsg.classList.remove('visible');
      successMsg.classList.remove('visible');
    }

    function setLoading(loading) {
      registerBtn.disabled = loading;
      registerBtn.innerHTML = loading
        ? '<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>'
        : 'Create Account';
    }

    async function handleRegister() {
      hideAlerts();

      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role     = document.getElementById('role').value;

      if (!username || !password) {
        showError('Username and password are required.');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch(`${BASE_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email: email || null, password, role })
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || 'Registration failed. Please try again.');
          return;
        }

        showSuccess(`Account created for "${data.username}"! Redirecting to login...`);

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);

      } catch (err) {
        showError('Could not connect to server. Is the backend running?');
      } finally {
        setLoading(false);
      }
    }
  </script>
</body>
</html>
