<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Inventory System</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --border-focus: #e8e8e8;
      --text: #f0f0f0;
      --muted: #6b6b6b;
      --accent: #d4f54a;
      --accent-dark: #a8c92e;
      --error: #ff5c5c;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 1rem;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tag {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tag::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    h1 {
      font-family: var(--font-display);
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
    }

    .field {
      margin-bottom: 1.25rem;
      animation: fadeUp 0.5s ease both;
    }

    .field:nth-child(1) { animation-delay: 0.1s; }
    .field:nth-child(2) { animation-delay: 0.18s; }
    .field:nth-child(3) { animation-delay: 0.26s; }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--border-focus);
    }

    input::placeholder {
      color: var(--muted);
    }

    .btn {
      width: 100%;
      margin-top: 0.5rem;
      padding: 13px;
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      border-radius: 8px;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .btn:hover  { background: var(--accent-dark); }
    .btn:active { transform: scale(0.98); }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      display: none;
      background: rgba(255, 92, 92, 0.1);
      border: 1px solid rgba(255, 92, 92, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--error);
      margin-bottom: 1rem;
    }

    .error-msg.visible { display: block; }

    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 13px;
      color: var(--muted);
    }

    .footer-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-link a:hover { text-decoration: underline; }

    .loading-dots span {
      display: inline-block;
      animation: blink 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="tag">Inventory System</div>
    <h1>Welcome back.</h1>
    <p class="subtitle">Sign in to manage your inventory, workers and supplies.</p>

    <div class="card">
      <div class="error-msg" id="errorMsg"></div>

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="your_username" autocomplete="username" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <div class="field">
        <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
      </div>
    </div>

    <div class="footer-link">
      Don't have an account? <a href="register.html">Register</a>
    </div>
  </div>

  <script>
    const BASE_URL = 'http://localhost:8000';

    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function hideError() {
      errorMsg.classList.remove('visible');
    }

    function setLoading(loading) {
      loginBtn.disabled = loading;
      loginBtn.innerHTML = loading
        ? '<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>'
        : 'Sign In';
    }

    async function handleLogin() {
      hideError();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please enter your username and password.');
        return;
      }

      setLoading(true);

      try {
        // FastAPI OAuth2PasswordRequestForm requires form-encoded data
        const formData = new URLSearchParams();
        formData.append('username', username);
        formData.append('password', password);

        const res = await fetch(`${BASE_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData.toString()
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || 'Login failed. Please try again.');
          return;
        }

        // Store token
        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('token_type', data.token_type);

        // Redirect to dashboard
        window.location.href = 'items.html';

      } catch (err) {
        showError('Could not connect to server. Is the backend running?');
      } finally {
        setLoading(false);
      }
    }
  </script>
</body>
</html>
