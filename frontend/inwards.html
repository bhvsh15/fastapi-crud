<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inwards — Inventory System</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e; --surface: #161616; --surface2: #1e1e1e;
      --border: #2a2a2a; --border-focus: #e8e8e8;
      --text: #f0f0f0; --muted: #6b6b6b;
      --accent: #d4f54a; --accent-dark: #a8c92e;
      --error: #ff5c5c; --success: #4af5a0;
      --font-display: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    .navbar { position: sticky; top: 0; z-index: 100; background: rgba(14,14,14,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .nav-brand { font-family: var(--font-display); font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .nav-brand span { color: var(--accent); font-size: 11px; font-family: var(--font-mono); font-weight: 400; letter-spacing: 0.1em; border: 1px solid var(--accent); border-radius: 4px; padding: 2px 7px; }
    .nav-links { display: flex; gap: 1.5rem; align-items: center; }
    .nav-links a { font-size: 13px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .nav-user { font-size: 12px; color: var(--muted); }
    .role-badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; }
    .role-admin { background: rgba(212,245,74,0.12); color: var(--accent); border: 1px solid rgba(212,245,74,0.3); }
    .role-staff { background: rgba(107,107,107,0.15); color: var(--muted); border: 1px solid rgba(107,107,107,0.3); }
    .btn-logout { font-size: 12px; color: var(--error); background: none; border: 1px solid rgba(255,92,92,0.3); border-radius: 6px; padding: 5px 12px; cursor: pointer; font-family: var(--font-mono); transition: background 0.2s; }
    .btn-logout:hover { background: rgba(255,92,92,0.1); }
    .main { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    .page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .page-title { font-family: var(--font-display); font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; }
    .page-title span { color: var(--muted); font-size: 1rem; font-family: var(--font-mono); font-weight: 400; margin-left: 10px; }
    .btn-primary { background: var(--accent); color: #0e0e0e; border: none; border-radius: 8px; padding: 10px 20px; font-family: var(--font-display); font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-primary:active { transform: scale(0.98); }
    .toolbar { display: flex; gap: 10px; margin-bottom: 1.5rem; }
    .search-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-family: var(--font-mono); font-size: 13px; color: var(--text); outline: none; transition: border-color 0.2s; }
    .search-input:focus { border-color: var(--border-focus); }
    .search-input::placeholder { color: var(--muted); }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { background: var(--surface2); border-bottom: 1px solid var(--border); }
    th { padding: 12px 16px; text-align: left; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
    td { padding: 13px 16px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: var(--surface2); }
    .badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; background: rgba(212,245,74,0.12); color: var(--accent); border: 1px solid rgba(212,245,74,0.25); }
    .action-btns { display: flex; gap: 8px; }
    .btn-edit, .btn-delete { border: none; border-radius: 6px; padding: 6px 12px; font-size: 12px; font-family: var(--font-mono); cursor: pointer; transition: background 0.15s, transform 0.1s; }
    .btn-edit { background: rgba(212,245,74,0.1); color: var(--accent); border: 1px solid rgba(212,245,74,0.2); }
    .btn-edit:hover { background: rgba(212,245,74,0.2); }
    .btn-delete { background: rgba(255,92,92,0.1); color: var(--error); border: 1px solid rgba(255,92,92,0.2); }
    .btn-delete:hover { background: rgba(255,92,92,0.2); }
    .btn-edit:active, .btn-delete:active { transform: scale(0.96); }
    .empty-state { text-align: center; padding: 3rem; color: var(--muted); font-size: 14px; }
    /* CUSTOM CONFIRM */
    .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; align-items: center; justify-content: center; padding: 1rem; }
    .confirm-overlay.open { display: flex; }
    .confirm-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 100%; max-width: 360px; animation: fadeUp 0.2s ease both; }
    .confirm-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .confirm-msg { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.6; }
    .confirm-btns { display: flex; gap: 10px; }
    .confirm-cancel { flex: 1; padding: 10px; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: var(--font-mono); font-size: 13px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .confirm-cancel:hover { border-color: var(--text); color: var(--text); }
    .confirm-delete { flex: 1; padding: 10px; background: rgba(255,92,92,0.15); color: var(--error); border: 1px solid rgba(255,92,92,0.3); border-radius: 8px; font-family: var(--font-display); font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .confirm-delete:hover { background: rgba(255,92,92,0.25); }
    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 100%; max-width: 440px; animation: fadeUp 0.25s ease both; max-height: 90vh; overflow-y: auto; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .modal-title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; }
    .btn-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 2px 6px; border-radius: 4px; line-height: 1; transition: color 0.2s; }
    .btn-close:hover { color: var(--text); }
    .field { margin-bottom: 1.1rem; }
    label { display: block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
    input, select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; font-family: var(--font-mono); font-size: 13px; color: var(--text); outline: none; transition: border-color 0.2s; appearance: none; }
    input:focus, select:focus { border-color: var(--border-focus); }
    input::placeholder { color: var(--muted); }
    select option { background: var(--surface); color: var(--text); }
    .select-wrap { position: relative; }
    .select-wrap::after { content: '▾'; position: absolute; right: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 12px; }
    .modal-footer { display: flex; gap: 10px; margin-top: 1.5rem; }
    .btn-cancel { flex: 1; padding: 11px; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: var(--font-mono); font-size: 13px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }
    .btn-save { flex: 2; padding: 11px; background: var(--accent); color: #0e0e0e; border: none; border-radius: 8px; font-family: var(--font-display); font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-save:hover { background: var(--accent-dark); }
    .btn-save:active { transform: scale(0.98); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .toast { position: fixed; bottom: 2rem; right: 2rem; z-index: 400; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 13px; transform: translateY(80px); opacity: 0; transition: transform 0.3s ease, opacity 0.3s ease; max-width: 320px; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(74,245,160,0.3); color: var(--success); }
    .toast.error { border-color: rgba(255,92,92,0.3); color: var(--error); }
    .modal-error { background: rgba(255,92,92,0.1); border: 1px solid rgba(255,92,92,0.3); border-radius: 8px; padding: 9px 13px; font-size: 12px; color: var(--error); margin-bottom: 1rem; display: none; }
    .modal-error.visible { display: block; }
    .loading-dots span { display: inline-block; animation: blink 1.2s infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Inventory <span>system</span></div>
    <div class="nav-links">
      <a href="items.html">Items</a>
      <a href="suppliers.html">Suppliers</a>
      <a href="inwards.html" class="active">Inwards</a>
      <a href="outwardslips.html">Outward Slips</a>
      <a href="outwards.html">Outwards</a>
      <a href="outwardbarcodes.html">Barcodes</a>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="navUser"></span>
      <span class="role-badge" id="roleBadge"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <main class="main">
    <div class="page-header">
      <div class="page-title">Inwards <span id="inwardCount"></span></div>
      <button class="btn-primary" onclick="openCreateModal()">+ Add Inward</button>
    </div>
    <div class="toolbar">
      <input class="search-input" type="text" id="searchInput" placeholder="Search by barcode..." oninput="filterInwards()"/>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Barcode</th><th>Item</th><th>Supplier</th><th>Quantity</th><th>Date</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="inwardsTableBody">
          <tr><td colspan="7" class="empty-state">Loading inwards...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- CUSTOM CONFIRM DIALOG -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-title">Delete Inward</div>
      <div class="confirm-msg">Are you sure you want to delete this entry? This cannot be undone.</div>
      <div class="confirm-btns">
        <button class="confirm-cancel" id="confirmCancelBtn">Cancel</button>
        <button class="confirm-delete" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>

  <!-- CREATE / EDIT MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Add Inward</div>
        <button class="btn-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-error" id="modalError"></div>
      <div class="field"><label>Barcode</label><input type="text" id="fieldBarcode" placeholder="e.g. BAR123456"/></div>
      <div class="field">
        <label>Item</label>
        <div class="select-wrap"><select id="fieldItem"><option value="">— Select Item —</option></select></div>
      </div>
      <div class="field">
        <label>Supplier</label>
        <div class="select-wrap"><select id="fieldSupplier"><option value="">— Select Supplier —</option></select></div>
      </div>
      <div class="field"><label>Quantity</label><input type="number" id="fieldQuantity" placeholder="e.g. 50" min="1"/></div>
      <div class="field"><label>Date</label><input type="datetime-local" id="fieldDate"/></div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" id="saveBtn" onclick="saveInward()">Save Inward</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const BASE_URL = 'http://localhost:8000';
    let allInwards = [], allItems = [], allSuppliers = [];
    let editingId = null, currentRole = null, pendingDeleteId = null;

    function getToken() { return localStorage.getItem('access_token'); }
    function getUserRole() { try { return JSON.parse(atob(getToken().split('.')[1])).role; } catch { return null; } }
    function getUserName() { try { return JSON.parse(atob(getToken().split('.')[1])).sub || ''; } catch { return ''; } }
    function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` }; }
    function logout() { localStorage.removeItem('access_token'); localStorage.removeItem('token_type'); window.location.href = 'login.html'; }

    function applyRoleUI() {
      currentRole = getUserRole();
      document.getElementById('navUser').textContent = getUserName();
      const badge = document.getElementById('roleBadge');
      badge.textContent = currentRole || '';
      badge.className = `role-badge ${currentRole === 'admin' ? 'role-admin' : 'role-staff'}`;
    }

    let toastTimer;
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast ${type} show`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── Custom confirm ────────────────────────────────────────
    function openConfirm(id) {
      pendingDeleteId = id;
      document.getElementById('confirmOverlay').classList.add('open');
    }
    function closeConfirm() {
      pendingDeleteId = null;
      document.getElementById('confirmOverlay').classList.remove('open');
    }
    document.getElementById('confirmCancelBtn').addEventListener('click', closeConfirm);
    document.getElementById('confirmDeleteBtn').addEventListener('click', function() {
      const id = pendingDeleteId;
      closeConfirm();
      if (id !== null) doDeleteInward(id);
    });
    document.getElementById('confirmOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeConfirm();
    });

    // ── Dropdowns ─────────────────────────────────────────────
    async function loadDropdowns() {
      try {
        const [ir, sr] = await Promise.all([
          fetch(`${BASE_URL}/items/`, { headers: authHeaders() }),
          fetch(`${BASE_URL}/suppliers/`, { headers: authHeaders() })
        ]);
        if (ir.ok) {
          const d = await ir.json(); allItems = d.data || [];
          const sel = document.getElementById('fieldItem');
          sel.innerHTML = '<option value="">— Select Item —</option>';
          allItems.forEach(i => { const o = document.createElement('option'); o.value = i.id; o.textContent = `${i.name} (stock: ${i.stock})`; sel.appendChild(o); });
        }
        if (sr.ok) {
          const d = await sr.json(); allSuppliers = d.data || [];
          const sel = document.getElementById('fieldSupplier');
          sel.innerHTML = '<option value="">— Select Supplier —</option>';
          allSuppliers.forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = s.name; sel.appendChild(o); });
        }
      } catch(e) { console.error('Dropdown error:', e); }
    }

    // ── Load inwards ──────────────────────────────────────────
    async function loadInwards() {
      if (!getToken()) { window.location.href = 'login.html'; return; }
      try {
        const res = await fetch(`${BASE_URL}/inwards/`, { headers: authHeaders() });
        if (res.status === 401) { logout(); return; }
        if (res.status === 404) { allInwards = []; renderTable([]); return; }
        const data = await res.json();
        allInwards = data.data || [];
        renderTable(allInwards);
      } catch(e) {
        console.error('Load error:', e);
        document.getElementById('inwardsTableBody').innerHTML = `<tr><td colspan="7" class="empty-state">Could not load inwards.</td></tr>`;
      }
    }

    function getItemName(id) { const i = allItems.find(i => i.id === id); return i ? i.name : `Item #${id}`; }
    function getSupplierName(id) { const s = allSuppliers.find(s => s.id === id); return s ? s.name : `Supplier #${id}`; }
    function formatDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }); }

    function renderTable(inwards) {
      document.getElementById('inwardCount').textContent = `(${inwards.length})`;
      if (!inwards.length) {
        document.getElementById('inwardsTableBody').innerHTML = `<tr><td colspan="7" class="empty-state">No inward entries found.</td></tr>`;
        return;
      }
      document.getElementById('inwardsTableBody').innerHTML = inwards.map(inw => `
        <tr>
          <td style="color:var(--muted)">${inw.id}</td>
          <td><span class="badge">${inw.barcode}</span></td>
          <td>${getItemName(inw.item_id)}</td>
          <td>${getSupplierName(inw.supplier_id)}</td>
          <td style="font-weight:500">${inw.quantity}</td>
          <td style="color:var(--muted)">${formatDate(inw.date)}</td>
          <td>
            <div class="action-btns">
              <button class="btn-edit" onclick="openEditModal(${inw.id})">Edit</button>
              <button class="btn-delete" onclick="openConfirm(${inw.id})">Delete</button>
            </div>
          </td>
        </tr>`).join('');
    }

    function filterInwards() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      renderTable(allInwards.filter(i => String(i.barcode).toLowerCase().includes(q)));
    }

    // ── Delete ────────────────────────────────────────────────
    async function doDeleteInward(id) {
      try {
        const res = await fetch(`${BASE_URL}/inward/${id}`, { method: 'DELETE', headers: authHeaders() });
        if (res.status === 204) { showToast('Inward deleted.', 'success'); await loadInwards(); return; }
        const text = await res.text();
        if (text.includes('outward barcode')) { showToast('Cannot delete — outward barcode exists.', 'error'); return; }
        if (res.ok) { showToast('Inward deleted.', 'success'); await loadInwards(); return; }
        showToast('Failed to delete inward.', 'error');
      } catch(e) { console.error('Delete error:', e); showToast('Could not connect to server.', 'error'); }
    }

    // ── Modal ─────────────────────────────────────────────────
    function openCreateModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Add Inward';
      document.getElementById('fieldBarcode').value = '';
      document.getElementById('fieldItem').value = '';
      document.getElementById('fieldSupplier').value = '';
      document.getElementById('fieldQuantity').value = '';
      document.getElementById('fieldDate').value = new Date().toISOString().slice(0,16);
      document.getElementById('saveBtn').textContent = 'Save Inward';
      hideModalError();
      document.getElementById('modalOverlay').classList.add('open');
    }

    function openEditModal(id) {
      const inw = allInwards.find(i => i.id === id);
      if (!inw) return;
      editingId = id;
      document.getElementById('modalTitle').textContent = 'Edit Inward';
      document.getElementById('fieldBarcode').value = inw.barcode;
      document.getElementById('fieldItem').value = inw.item_id;
      document.getElementById('fieldSupplier').value = inw.supplier_id;
      document.getElementById('fieldQuantity').value = inw.quantity;
      document.getElementById('fieldDate').value = inw.date ? inw.date.slice(0,16) : '';
      document.getElementById('saveBtn').textContent = 'Update Inward';
      hideModalError();
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
    function showModalError(msg) { const el = document.getElementById('modalError'); el.textContent = msg; el.classList.add('visible'); }
    function hideModalError() { document.getElementById('modalError').classList.remove('visible'); }

    async function saveInward() {
      hideModalError();
      const barcode = document.getElementById('fieldBarcode').value.trim();
      const item_id = parseInt(document.getElementById('fieldItem').value);
      const supplier_id = parseInt(document.getElementById('fieldSupplier').value);
      const quantity = parseInt(document.getElementById('fieldQuantity').value);
      const date = document.getElementById('fieldDate').value;
      if (!barcode || isNaN(item_id) || isNaN(supplier_id) || isNaN(quantity) || quantity < 1) {
        showModalError('All fields are required and quantity must be at least 1.'); return;
      }
      const payload = { barcode, item_id, supplier_id, quantity, date: date ? new Date(date).toISOString() : null };
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>';
      try {
        const res = await fetch(editingId ? `${BASE_URL}/inward/${editingId}` : `${BASE_URL}/inward/create`, {
          method: editingId ? 'PUT' : 'POST', headers: authHeaders(), body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) { showModalError(data.detail || 'Something went wrong.'); return; }
        closeModal();
        showToast(editingId ? 'Inward updated!' : `Inward created! Stock: ${data.updated_stock ?? ''}`, 'success');
        await loadInwards();
      } catch { showModalError('Could not connect to server.'); }
      finally { saveBtn.disabled = false; saveBtn.textContent = editingId ? 'Update Inward' : 'Save Inward'; }
    }

    document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

    applyRoleUI();
    loadDropdowns().then(() => loadInwards());
  </script>
</body>
</html>
